<title>Dulce Mundo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;

}

body{
    background:#b8f5b8;
    color:#ffffff;
}

header{
    background:#4CAF50;
    padding:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
}

.logo{
    width:80px;
    height:80px;
    border:3px solid white;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    color:white;
}

h1{
    font-size:42px;
    text-transform:uppercase;
}

.banner{
    text-align:center;
    padding:60px 20px;
}

.banner h2{
    font-size:40px;
    margin-bottom:20px;
}

.banner p{
    font-size:20px;
}

.productos{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.tarjeta{
    background:white;
    color:#333;
    border-radius:15px;
    padding:20px;
    text-align:center;
}

.tarjeta img{
    width:100%;
    border-radius:10px;
}

footer{
    background:#4CAF50;
    text-align:center;
    padding:20px;
    margin-top:30px;
}
</style>

</head>
